<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AdaptLearn - Login</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0e0f11; --surface: #16181c; --surface2: #1e2026;
      --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.13);
      --text: #e8e9ec; --muted: #7a7d87;
      --accent: #6c8fff; --accent2: #a78bfa; --green: #4ade80;
      body.modo-claro{--bg:#f0f2f7;--surface:#ffffff;--surface2:#e8eaf0;--border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.14);--text:#1a1c22;--muted:#6b7280}
    --font: 'Sora', sans-serif; --mono: 'JetBrains Mono', monospace;
    }
    body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .bg-glow { position: fixed; inset: 0; pointer-events: none; overflow: hidden; }
    .glow1 { position: absolute; width: 500px; height: 500px; border-radius: 50%; background: radial-gradient(circle, rgba(108,143,255,0.08) 0%, transparent 70%); top: -100px; left: -100px; }
    .glow2 { position: absolute; width: 400px; height: 400px; border-radius: 50%; background: radial-gradient(circle, rgba(167,139,250,0.07) 0%, transparent 70%); bottom: -50px; right: -50px; }
    .container { width: 100%; max-width: 420px; animation: fadeUp 0.5s ease both; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
    .logo-wrap { text-align: center; margin-bottom: 32px; }
    .logo-icon { width: 52px; height: 52px; border-radius: 16px; background: linear-gradient(135deg, var(--accent), var(--accent2)); display: flex; align-items: center; justify-content: center; font-size: 24px; margin: 0 auto 14px; box-shadow: 0 0 40px rgba(108,143,255,0.3); }
    .logo-wrap h1 { font-size: 22px; font-weight: 600; letter-spacing: -0.5px; }
    .logo-wrap p { font-size: 13px; color: var(--muted); margin-top: 4px; }
    .card { background: var(--surface); border: 1px solid var(--border2); border-radius: 20px; padding: 28px; box-shadow: 0 20px 60px rgba(0,0,0,0.4); }
    .tabs { display: flex; gap: 4px; background: var(--bg); border-radius: 12px; padding: 4px; margin-bottom: 24px; }
    .tab { flex: 1; padding: 9px; border: none; background: none; color: var(--muted); font-family: var(--font); font-size: 13px; font-weight: 500; border-radius: 9px; cursor: pointer; transition: all 0.2s; }
    .tab.active { background: var(--surface2); color: var(--text); box-shadow: 0 1px 4px rgba(0,0,0,0.3); }
    .form { display: flex; flex-direction: column; gap: 14px; }
    .field { display: flex; flex-direction: column; gap: 6px; }
    label { font-size: 12px; font-weight: 500; color: var(--muted); letter-spacing: 0.3px; }
    .input-wrap2 { position: relative; display: flex; align-items: center; }
    .input-icon { position: absolute; left: 14px; font-size: 14px; pointer-events: none; }
    input[type=text], input[type=email], input[type=password] { width: 100%; padding: 11px 14px 11px 38px; background: var(--surface2); border: 1px solid var(--border2); border-radius: 11px; color: var(--text); font-family: var(--font); font-size: 14px; outline: none; transition: border-color 0.2s, box-shadow 0.2s; }
    input:focus { border-color: rgba(108,143,255,0.5); box-shadow: 0 0 0 3px rgba(108,143,255,0.1); }
    input::placeholder { color: var(--muted); }
    .chips-label { font-size: 12px; font-weight: 500; color: var(--muted); letter-spacing: 0.3px; margin-bottom: 6px; }
    .chips { display: flex; flex-wrap: wrap; gap: 8px; }
    .chip { padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border2); background: var(--surface2); color: var(--muted); font-size: 12px; cursor: pointer; transition: all 0.18s; font-family: var(--font); }
    .chip:hover { border-color: var(--accent); color: var(--text); }
    .chip.selected { background: rgba(108,143,255,0.15); border-color: var(--accent); color: var(--accent); }
    .divider { display: flex; align-items: center; gap: 10px; color: var(--muted); font-size: 12px; margin: 4px 0; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border2); }
    .btn-google { width: 100%; padding: 11px; background: var(--surface2); border: 1px solid var(--border2); border-radius: 11px; color: var(--text); font-family: var(--font); font-size: 13px; font-weight: 500; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: all 0.2s; }
    .btn-google:hover { background: #252830; transform: translateY(-1px); }
    .google-icon { width: 18px; height: 18px; }
    .btn-submit { width: 100%; padding: 12px; background: linear-gradient(135deg, var(--accent), var(--accent2)); border: none; border-radius: 11px; color: white; font-family: var(--font); font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; box-shadow: 0 4px 20px rgba(108,143,255,0.3); margin-top: 4px; }
    .btn-submit:hover { transform: translateY(-1px); box-shadow: 0 6px 24px rgba(108,143,255,0.4); }
    .btn-submit:active { transform: translateY(0); }
    .success-screen { text-align: center; padding: 20px 0; display: none; flex-direction: column; align-items: center; gap: 14px; }
    .success-icon { width: 60px; height: 60px; border-radius: 50%; background: rgba(74,222,128,0.15); border: 1px solid rgba(74,222,128,0.3); display: flex; align-items: center; justify-content: center; font-size: 28px; }
    .success-screen h2 { font-size: 18px; font-weight: 600; }
    .success-screen p { font-size: 13px; color: var(--muted); }
    .hint { font-size: 11px; color: var(--muted); text-align: center; margin-top: 16px; line-height: 1.5; font-family: var(--mono); }
    .error-msg { color: #ff6b6b; font-size: 13px; font-weight: 500; text-align: center; margin-top: 4px; display: none; background: rgba(255,107,107,0.1); border: 1px solid rgba(255,107,107,0.2); padding: 8px 12px; border-radius: 9px; }
  </style>
  <script src="{{ url_for('static', filename='js/tema.js') }}"></script>
</head>
<body>

<div class="bg-glow"><div class="glow1"></div><div class="glow2"></div></div>

<div class="container">
  <div class="logo-wrap">
    <div class="logo-icon">🧠</div>
    <h1>AdaptLearn</h1>
    <p>Tu tutor IA personalizado</p>
  </div>

  <div class="card">
    <div class="tabs">
      <button class="tab active" onclick="switchTab('login')">Iniciar sesión</button>
      <button class="tab" onclick="switchTab('registro')">Crear cuenta</button>
    </div>

    <!-- LOGIN -->
    <div id="loginForm">
      <div class="form">
        <div class="field">
          <label>CORREO ELECTRÓNICO</label>
          <div class="input-wrap2">
            <span class="input-icon"></span>
            <input type="email" placeholder="tu@correo.com" id="loginEmail"/>
          </div>
        </div>
        <div class="field">
          <label>CONTRASEÑA</label>
          <div class="input-wrap2">
            <span class="input-icon"></span>
            <input type="password" placeholder="••••••••" id="loginPass"/>
          </div>
        </div>
        <div id="loginError" class="error-msg"></div>
        <button class="btn-submit" onclick="handleLogin()">Entrar →</button>
        <div class="divider">o</div>
        <button class="btn-google" onclick="handleGoogle()">
          <svg class="google-icon" viewBox="0 0 24 24">
            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
          </svg>
          Continuar con Google
        </button>
      </div>
    </div>

    <!-- REGISTRO -->
    <div id="registroForm" style="display:none">
      <div class="form">
        <div class="field">
          <label>NOMBRE COMPLETO</label>
          <div class="input-wrap2">
            <span class="input-icon">👤</span>
            <input type="text" placeholder="Ej: Sebastián López" id="regNombre"/>
          </div>
        </div>
        <div class="field">
          <label>CORREO ELECTRÓNICO</label>
          <div class="input-wrap2">
            <span class="input-icon"></span>
            <input type="email" placeholder="tu@correo.com" id="regEmail"/>
          </div>
        </div>
        <div class="field">
          <label>CONTRASEÑA</label>
          <div class="input-wrap2">
            <span class="input-icon"></span>
            <input type="password" placeholder="Mínimo 8 caracteres" id="regPass"/>
          </div>
        </div>
        <div class="field">
          <div class="chips-label">¿QUÉ TE GUSTA HACER? (elige uno)</div>
          <div class="chips">
            <button class="chip" onclick="selectChip(this, 'Fútbol')">⚽ Fútbol</button>
            <button class="chip" onclick="selectChip(this, 'Voleibol')">🏐 Voleibol</button>
            <button class="chip" onclick="selectChip(this, 'Baloncesto')">🏀 Baloncesto</button>
            <button class="chip" onclick="selectChip(this, 'Música')">🎵 Música</button>
            <button class="chip" onclick="selectChip(this, 'Videojuegos')">🎮 Videojuegos</button>
            <button class="chip" onclick="selectChip(this, 'Cocina')">🍳 Cocina</button>
            <button class="chip" onclick="selectChip(this, 'Arte')">🎨 Arte</button>
            <button class="chip" onclick="selectChip(this, 'Cine')">🎬 Cine</button>
          </div>
        </div>
        <div id="regError" class="error-msg"></div>
        <button class="btn-submit" onclick="handleRegistro()">Crear cuenta →</button>
        <div class="divider">o</div>
        <button class="btn-google" onclick="handleGoogle()">
          <svg class="google-icon" viewBox="0 0 24 24">
            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
          </svg>
          Continuar con Google
        </button>
      </div>
    </div>

    <!-- SUCCESS -->
    <div class="success-screen" id="successScreen">
      <div class="success-icon">✓</div>
      <h2 id="successTitle">¡Bienvenido!</h2>
      <p id="successMsg">Redirigiendo...</p>
      <button class="btn-submit" style="max-width:200px" onclick="goToChat()">Ir al chat →</button>
    </div>
  </div>

  <p class="hint">Tesis universitaria · Ingeniería en Software</p>
</div>

<script>
  let selectedInteres = '';
  let lastRedirect = '/dashboard';

  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach((t, i) =>
      t.classList.toggle('active', (tab==='login' && i===0) || (tab==='registro' && i===1))
    );
    document.getElementById('loginForm').style.display    = tab === 'login'    ? 'block' : 'none';
    document.getElementById('registroForm').style.display = tab === 'registro' ? 'block' : 'none';
    document.getElementById('successScreen').style.display = 'none';
    document.getElementById('loginError').style.display = 'none';
    document.getElementById('regError').style.display   = 'none';
  }

  // ── AUTO-ACTIVAR PESTAÑA SEGÚN ?tab=registro ──────
  (function() {
    var params = new URLSearchParams(window.location.search);
    if (params.get('tab') === 'registro') {
      switchTab('registro');
    }
  })();

  function selectChip(el, value) {
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('selected'));
    el.classList.add('selected');
    selectedInteres = value;
  }

  function showSuccess(title, msg) {
    document.getElementById('loginForm').style.display    = 'none';
    document.getElementById('registroForm').style.display = 'none';
    document.getElementById('successScreen').style.display = 'flex';
    document.getElementById('successTitle').textContent = title;
    document.getElementById('successMsg').textContent   = msg;
  }

  function goToChat() {
    window.location.href = lastRedirect;
  }

  function handleGoogle() {
    window.location.href = '/login/google';
  }

  async function handleLogin() {
    const email = document.getElementById('loginEmail').value.trim();
    const pass  = document.getElementById('loginPass').value.trim();
    const errorEl = document.getElementById('loginError');
    errorEl.style.display = 'none';
    if (!email || !pass) {
      errorEl.textContent = 'Datos incompletos';
      errorEl.style.display = 'block';
      return;
    }
    try {
      const res  = await fetch('/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password: pass })
      });
      const data = await res.json();
      if (res.ok) {
        lastRedirect = data.redirect || '/dashboard';
        showSuccess('¡Bienvenido, ' + data.nombre + '!', data.mensaje);
        setTimeout(() => { window.location.href = '/chat'; }, 1500);
      } else {
        errorEl.textContent = data.error || 'Correo o contraseña incorrectos';
        errorEl.style.display = 'block';
      }
    } catch (err) {
      errorEl.textContent = 'No se pudo conectar con el servidor';
      errorEl.style.display = 'block';
    }
  }

  async function handleRegistro() {
    const nombre  = document.getElementById('regNombre').value.trim();
    const email   = document.getElementById('regEmail').value.trim();
    const pass    = document.getElementById('regPass').value.trim();
    const errorEl = document.getElementById('regError');
    errorEl.style.display = 'none';
    if (!nombre || !email || !pass) {
      errorEl.textContent = 'Por favor llena todos los campos';
      errorEl.style.display = 'block';
      return;
    }
    if (pass.length < 8) {
      errorEl.textContent = 'La contraseña debe tener mínimo 8 caracteres';
      errorEl.style.display = 'block';
      return;
    }
    if (!selectedInteres) {
      errorEl.textContent = 'Por favor selecciona un interés';
      errorEl.style.display = 'block';
      return;
    }
    try {
      const res  = await fetch('/registro', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ nombre, email, password: pass, interes: selectedInteres })
      });
      const data = await res.json();
      if (res.ok) {
        lastRedirect = '/acceder';
        showSuccess('¡Hola, ' + nombre.split(' ')[0] + '!', '¡Cuenta creada! Inicia sesión para continuar.');
        setTimeout(() => { switchTab('login'); }, 2000);
      } else {
        errorEl.textContent = data.error || 'Error al crear la cuenta';
        errorEl.style.display = 'block';
      }
    } catch (err) {
      errorEl.textContent = 'No se pudo conectar con el servidor';
      errorEl.style.display = 'block';
    }
  }
</script>
</body>
</html>
