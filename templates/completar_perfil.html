<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AdaptLearn - Completa tu perfil</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');
    *{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#0e0f11;--surface:#16181c;--surface2:#1e2026;
      --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
      --text:#e8e9ec;--muted:#7a7d87;
      --accent:#6c8fff;--accent2:#a78bfa;--green:#4ade80;
      --font:'Sora',sans-serif;--mono:'JetBrains Mono',monospace;
    }
    body.modo-claro{
      --bg:#f0f2f7;--surface:#ffffff;--surface2:#e8eaf0;
      --border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.14);
      --text:#1a1c22;--muted:#6b7280;
    }
    body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
    .bg-glow{position:fixed;inset:0;pointer-events:none;overflow:hidden}
    .glow1{position:absolute;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(108,143,255,0.08) 0%,transparent 70%);top:-100px;left:-100px}
    .glow2{position:absolute;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(167,139,250,0.07) 0%,transparent 70%);bottom:-50px;right:-50px}
    .container{width:100%;max-width:420px;animation:fadeUp 0.5s ease both}
    @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
    .logo-wrap{text-align:center;margin-bottom:32px}
    .logo-icon{width:52px;height:52px;border-radius:16px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:24px;margin:0 auto 14px;box-shadow:0 0 40px rgba(108,143,255,0.3)}
    .logo-wrap h1{font-size:22px;font-weight:600;letter-spacing:-0.5px}
    .logo-wrap p{font-size:13px;color:var(--muted);margin-top:4px}
    .card{background:var(--surface);border:1px solid var(--border2);border-radius:20px;padding:28px;box-shadow:0 20px 60px rgba(0,0,0,0.4)}
    .form{display:flex;flex-direction:column;gap:14px}
    .field{display:flex;flex-direction:column;gap:6px;margin-bottom:10px}
    .chips-label{font-size:13px;font-weight:500;color:var(--text);letter-spacing:0.3px;margin-bottom:12px;text-align:center}
    .chips{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
    .chip{padding:8px 16px;border-radius:20px;border:1px solid var(--border2);background:var(--surface2);color:var(--muted);font-size:13px;cursor:pointer;transition:all 0.18s;font-family:var(--font)}
    .chip:hover{border-color:var(--accent);color:var(--text)}
    .chip.selected{background:rgba(108,143,255,0.15);border-color:var(--accent);color:var(--accent)}
    .btn-submit{width:100%;padding:12px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:11px;color:white;font-family:var(--font);font-size:14px;font-weight:600;cursor:pointer;transition:all 0.2s;box-shadow:0 4px 20px rgba(108,143,255,0.3);margin-top:10px}
    .btn-submit:hover{transform:translateY(-1px);box-shadow:0 6px 24px rgba(108,143,255,0.4)}
    .error-msg{color:#ff6b6b;font-size:13px;font-weight:500;text-align:center;margin-top:4px;display:none;background:rgba(255,107,107,0.1);border:1px solid rgba(255,107,107,0.2);padding:8px 12px;border-radius:9px}
  </style>
  <script src="{{ url_for('static', filename='js/tema.js') }}"></script>
</head>
<body>
  <div class="bg-glow"><div class="glow1"></div><div class="glow2"></div></div>
  <div class="container">
    <div class="logo-wrap">
      <div class="logo-icon">🧠</div>
      <h1>AdaptLearn</h1>
      <p>Solo un paso más</p>
    </div>
    <div class="card">
      <div class="form">
        <div class="field">
          <div class="chips-label">¿Qué te gusta hacer? (elige uno)</div>
          <div class="chips">
            <button class="chip" onclick="selectChip(this, 'Fútbol')">⚽ Fútbol</button>
            <button class="chip" onclick="selectChip(this, 'Voleibol')">🏐 Voleibol</button>
            <button class="chip" onclick="selectChip(this, 'Baloncesto')">🏀 Baloncesto</button>
            <button class="chip" onclick="selectChip(this, 'Música')">🎵 Música</button>
            <button class="chip" onclick="selectChip(this, 'Videojuegos')">🎮 Videojuegos</button>
            <button class="chip" onclick="selectChip(this, 'Cocina')">🍳 Cocina</button>
            <button class="chip" onclick="selectChip(this, 'Arte')">🎨 Arte</button>
            <button class="chip" onclick="selectChip(this, 'Cine')">🎬 Cine</button>
          </div>
        </div>
        <div id="perfilError" class="error-msg"></div>
        <button class="btn-submit" onclick="guardarPerfil()">Continuar →</button>
      </div>
    </div>
  </div>
  <script>
    let selectedInteres = '';
    function selectChip(el, value) {
      document.querySelectorAll('.chip').forEach(c => c.classList.remove('selected'));
      el.classList.add('selected');
      selectedInteres = value;
    }
    async function guardarPerfil() {
      const errorEl = document.getElementById('perfilError');
      errorEl.style.display = 'none';
      if (!selectedInteres) { errorEl.textContent = 'Por favor selecciona un interés para continuar'; errorEl.style.display = 'block'; return; }
      try {
        const res = await fetch('/guardar_interes', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({interes:selectedInteres}) });
        const data = await res.json();
        if (res.ok) { window.location.href = data.redirect || '/chat'; }
        else { errorEl.textContent = data.error || 'Error al guardar el perfil'; errorEl.style.display = 'block'; }
      } catch(err) { errorEl.textContent = 'No se pudo conectar con el servidor'; errorEl.style.display = 'block'; }
    }
  </script>
</body>
</html>
